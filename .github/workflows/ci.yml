name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install constrained test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c environment/constraints.txt -e ".[test]"
          python -m pip install -c environment/constraints.txt click docopt pykwalify requests ruamel.yaml
          python -m pip install --no-deps cffconvert==2.0.0
      - name: Validate public inputs
        run: oips-repro validate-data --config config/manuscript.yaml
      - name: Unit tests
        run: pytest tests/unit -q
      - name: Integration tests
        run: pytest tests/integration -q
      - name: Scientific snapshots
        run: pytest tests/scientific -q
      - name: Validate citation metadata
        run: cffconvert --validate
      - name: Verify frozen reference bundle
        run: oips-repro verify --config config/manuscript.yaml --bundle results/reference
      - name: Scan publication payload
        run: python scripts/release_check.py --repository-root . --data-manifest data/manifest.tsv --release-manifest release/manifest.json
